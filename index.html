<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAARK — YOU VS YOU</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    .heading-font {
      font-family: 'Playfair Display', serif;
    }
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), url('https://picsum.photos/id/1015/1920/1080');
      background-size: cover;
      background-position: center;
    }
    .glow {
      box-shadow: 0 0 60px -10px rgb(234 179 8);
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen overflow-x-hidden">

  <!-- Main Container -->
  <div class="hero-bg min-h-screen flex items-center relative">
    
    <div class="max-w-7xl mx-auto px-6 py-12 grid md:grid-cols-2 gap-12 items-center">

      <!-- Left Content -->
      <div class="space-y-8">
        <div class="flex items-center gap-3">
          <span class="text-red-600 text-3xl font-bold tracking-tighter">DAARK®</span>
          <span class="text-xs uppercase tracking-widest text-gray-400 ml-auto">No noise. No shortcuts.</span>
        </div>

        <h1 class="text-7xl md:text-8xl leading-none heading-font font-bold">
          YOU <span class="text-red-600">VS</span> YOU
        </h1>

        <div class="max-w-md text-lg text-gray-300">
          <p class="mb-4">Most people fail.</p>
          <p class="mb-4">Not because they lack effort.</p>
          <p>Because they lack structure.</p>
        </div>

        <!-- Waitlist Form -->
        <div class="bg-black/70 backdrop-blur-md border border-gray-800 p-8 rounded-2xl glow">
          <form id="waitlistForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <input 
                  type="email" 
                  id="email"
                  placeholder="Email address"
                  required
                  class="w-full bg-transparent border border-gray-700 focus:border-red-600 rounded-xl px-5 py-4 outline-none transition-all text-white placeholder-gray-500"
                >
              </div>
              <div>
                <input 
                  type="tel" 
                  id="phone"
                  placeholder="Phone number"
                  class="w-full bg-transparent border border-gray-700 focus:border-red-600 rounded-xl px-5 py-4 outline-none transition-all text-white placeholder-gray-500"
                >
              </div>
            </div>

            <button 
              type="submit"
              id="submitBtn"
              class="w-full bg-white hover:bg-amber-300 text-black font-semibold py-5 rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-3"
            >
              JOIN WAITLIST
            </button>
          </form>
        </div>

        <!-- Stats -->
        <div class="flex flex-wrap gap-8 text-center">
          <div>
            <div id="days" class="text-5xl font-bold tabular-nums">06</div>
            <div class="text-xs tracking-widest text-gray-500">DAYS</div>
          </div>
          <div>
            <div id="hours" class="text-5xl font-bold tabular-nums">14</div>
            <div class="text-xs tracking-widest text-gray-500">HOURS</div>
          </div>
          <div>
            <div id="minutes" class="text-5xl font-bold tabular-nums">37</div>
            <div class="text-xs tracking-widest text-gray-500">MINUTES</div>
          </div>
          <div>
            <div id="seconds" class="text-5xl font-bold tabular-nums">52</div>
            <div class="text-xs tracking-widest text-gray-500">SECONDS</div>
          </div>
        </div>

        <div class="flex items-center gap-4 text-sm">
          <div class="flex -space-x-3">
            <div class="w-8 h-8 bg-gray-700 border-2 border-black rounded-full flex items-center justify-center text-xs">👤</div>
            <div class="w-8 h-8 bg-gray-700 border-2 border-black rounded-full flex items-center justify-center text-xs">👤</div>
            <div class="w-8 h-8 bg-gray-700 border-2 border-black rounded-full flex items-center justify-center text-xs">👤</div>
          </div>
          <div>
            Already <span id="joinedCount" class="font-semibold text-amber-300">142</span> joined
          </div>
        </div>
      </div>

      <!-- Right Side - Visual Placeholder (you can replace with better image later) -->
      <div class="hidden md:block relative">
        <div class="aspect-video bg-zinc-950 rounded-3xl overflow-hidden border border-gray-800 shadow-2xl glow">
          <img 
            src="https://picsum.photos/id/1015/800/600" 
            alt="DAARK Doorway" 
            class="w-full h-full object-cover opacity-90"
          >
          <!-- Optional glowing overlay effect -->
          <div class="absolute inset-0 bg-gradient-to-r from-transparent via-amber-300/10 to-transparent"></div>
        </div>
      </div>
    </div>

    <!-- Footer tagline -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 text-xs text-gray-500 tracking-widest">
      DISCIPLINE IS THE ONLY WAY OUT
    </div>
  </div>

  <script>
    // Countdown Timer (adjust target date as needed)
    function startCountdown() {
      // Example: 7 days from now
      let targetDate = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);

      const timer = setInterval(() => {
        let now = new Date().getTime();
        let distance = targetDate - now;

        if (distance < 0) {
          clearInterval(timer);
          return;
        }

        let days = Math.floor(distance / (1000 * 60 * 60 * 24));
        let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        let seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").textContent = String(days).padStart(2, '0');
        document.getElementById("hours").textContent = String(hours).padStart(2, '0');
        document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
        document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
      }, 1000);
    }

    // Form Submission (Replace with your actual backend endpoint)
    document.getElementById("waitlistForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const btn = document.getElementById("submitBtn");

      if (!email) {
        alert("Please enter your email address");
        return;
      }

      btn.innerHTML = "JOINING...";
      btn.disabled = true;

      try {
        // ←←← Replace this URL with your actual backend endpoint ←←←
        const response = await fetch("https://your-backend.com/api/waitlist", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, phone })
        });

        if (response.ok) {
          alert("✅ You're in! Welcome to DAARK.");
          // Optional: increase counter
          let count = parseInt(document.getElementById("joinedCount").textContent);
          document.getElementById("joinedCount").textContent = count + 1;
        } else {
          alert("Something went wrong. Please try again.");
        }
      } catch (err) {
        console.error(err);
        alert("Connection error. Please check your internet.");
      }

      btn.innerHTML = "JOIN WAITLIST";
      btn.disabled = false;
    });

    // Initialize
    startCountdown();

    // Simulate joined count increasing slowly
    setInterval(() => {
      let countEl = document.getElementById("joinedCount");
      let count = parseInt(countEl.textContent);
      if (Math.random() > 0.7) countEl.textContent = count + 1;
    }, 8000);
  </script>
</body>
</html>
