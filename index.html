<script>
const canvas = document.getElementById('canvas')

const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000)
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true })

renderer.setSize(window.innerWidth, window.innerHeight)
camera.position.z = 5

// ===== DEPTH FOG (adds realism) =====
scene.fog = new THREE.FogExp2(0x000000, 0.04)

// ===== STARFIELD =====
const count = 1000
const positions = new Float32Array(count * 3)

for (let i = 0; i < count; i++) {
  let x = (Math.random() - 0.5) * 100
  let y = (Math.random() - 0.5) * 100

  // clean center (focus on door)
  if (Math.sqrt(x*x + y*y) < 8) continue

  positions[i * 3] = x
  positions[i * 3 + 1] = y
  positions[i * 3 + 2] = -Math.random() * 100
}

const geometry = new THREE.BufferGeometry()
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3))

// softer cinematic stars
const material = new THREE.PointsMaterial({
  color: 0x9fb3ff,
  size: 0.06,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false
})

const stars = new THREE.Points(geometry, material)
scene.add(stars)

let speed = 0.02

function animate() {
  requestAnimationFrame(animate)

  const pos = geometry.attributes.position.array

  for (let i = 0; i < pos.length; i += 3) {

    // ===== RADIAL MOTION (THIS IS KEY) =====
    const dx = -pos[i]
    const dy = -pos[i + 1]

    pos[i] += dx * speed * 0.02
    pos[i + 1] += dy * speed * 0.02
    pos[i + 2] += speed

    if (pos[i + 2] > 2) {
      pos[i] = (Math.random() - 0.5) * 100
      pos[i + 1] = (Math.random() - 0.5) * 100
      pos[i + 2] = -100
    }
  }

  geometry.attributes.position.needsUpdate = true
  renderer.render(scene, camera)
}

animate()

// ===== INTERACTION =====
const btn = document.getElementById("btn")
const door = document.getElementById("door")

btn.addEventListener("click", () => {

  gsap.to({ val: speed }, {
    val: 0.6,
    duration: 1.2,
    ease: "power3.out",
    onUpdate: function() {
      speed = this.targets()[0].val
    }
  })

  setTimeout(() => {
    door.classList.add("success")
  }, 500)
})
</script>
