<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAARK — Animation Flow</title>
    <style>
        :root {
            --black: #000000;
            --text: #ffffff;
            --muted: #8a8a8a;
            --red: #ff2b1a;
            --orange-glow: #ff4d00;
            --cream: #ede4d0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--black);
            color: var(--text);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* Hyperspace Stars Background */
        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            overflow: hidden;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
        }

        .hyperspace .star {
            animation: warp 0.8s infinite linear;
        }

        @keyframes warp {
            0% { transform: translateZ(0) scale(1); opacity: 0.3; }
            100% { transform: translateZ(500px) scale(2); opacity: 0; }
        }

        /* Main Content Container */
        .container {
            text-align: center;
            max-width: 400px;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .logo { font-size: 48px; font-weight: 900; letter-spacing: 15px; margin-bottom: 5px; }
        .logo span { color: var(--red); }
        .sub-tag { font-size: 10px; letter-spacing: 4px; color: var(--red); margin-bottom: 30px; display: block; }
        
        .headline { font-size: 24px; margin-bottom: 15px; font-weight: 400; }
        .description { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 30px; }

        /* Form Elements */
        .form-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            color: white;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--orange-glow); }

        .btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background: #d41f12; }

        /* The Door Component */
        .door-frame {
            width: 120px;
            height: 180px;
            border: 2px solid var(--cream);
            margin: 0 auto;
            position: relative;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 0px var(--orange-glow);
        }

        /* States from image_0009f0.jpg */
        .state-transition .door-frame {
            border-color: var(--orange-glow);
            box-shadow: 0 0 20px var(--orange-glow);
            background: rgba(255, 77, 0, 0.1);
        }

        .state-loading .door-frame {
            box-shadow: 0 0 50px var(--orange-glow);
            background: var(--orange-glow);
        }

        .state-success .door-frame {
            background: var(--cream);
            box-shadow: 0 0 80px var(--cream);
            border-color: var(--cream);
            transform: scale(1.1);
        }

        .hidden { display: none; }
        .success-msg { font-size: 32px; font-weight: 800; margin-top: 20px; }

    </style>
</head>
<body id="body">

    <div class="stars-container" id="stars"></div>

    <div class="container" id="main-ui">
        <div class="logo">DAA<span>R</span>K</div>
        <small class="sub-tag">YOU VS YOU</small>
        
        <div id="form-content">
            <p class="sub-tag">COMING SOON</p>
            <h1 class="headline">The journey begins within.</h1>
            <p class="description">Most people fail. Not because they lack effort. Because they lack structure.</p>
            
            <div class="form-group">
                <input type="email" placeholder="Enter your email" id="email">
                <input type="tel" placeholder="Enter your phone number">
                <button class="btn" onclick="startSequence()">JOIN WAITLIST</button>
            </div>
        </div>

        <div id="success-content" class="hidden">
            <h1 class="success-msg">YOU'RE IN.</h1>
            <p class="description">The journey begins within.</p>
            <button class="btn" style="background: transparent; border: 1px solid white;" onclick="location.reload()">BACK TO HOME</button>
        </div>

        <!-- The Door -->
        <div class="door-frame" id="door"></div>
    </div>

    <script>
        // Create random stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            starsContainer.appendChild(star);
        }

        function startSequence() {
            const body = document.getElementById('body');
            const door = document.getElementById('door');
            const form = document.getElementById('form-content');
            const success = document.getElementById('success-content');

            // 1. Transition Start (Door turns orange)
            body.classList.add('state-transition');
            
            // 2. Hyperspace Pullback
            setTimeout(() => {
                body.classList.add('hyperspace');
            }, 500);

            // 3. Button Clicked (Glow intensifies)
            setTimeout(() => {
                body.classList.remove('state-transition');
                body.classList.add('state-loading');
            }, 1500);

            // 4. Success (Door transforms to light cream)
            setTimeout(() => {
                body.classList.remove('state-loading', 'hyperspace');
                body.classList.add('state-success');
                form.classList.add('hidden');
                success.classList.remove('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
