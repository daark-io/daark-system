<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAARK</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* STARFIELD /
.starfield {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.15;
  animation: drift 40s linear infinite;
}

.starfield.fast {
  animation-duration: 2s;
  opacity: 0.4;
}

@keyframes drift {
  from { transform: translateY(0); }
  to { transform: translateY(-1000px); }
}

/ CENTER CONTENT /
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/ TEXT /
h1 {
  font-size: 40px;
  margin: 10px 0;
}

.red {
  color: #ff5a00;
}

/ INPUT /
input {
  margin: 5px;
  padding: 12px;
  width: 250px;
  background: #111;
  border: 1px solid #333;
  color: white;
  outline: none;
}

/ BUTTON /
button {
  margin-top: 10px;
  padding: 12px 30px;
  background: #ff5a00;
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  box-shadow: 0 0 20px rgba(255,90,0,0.6);
}

/ DOOR /
.door {
  margin-top: 30px;
  width: 140px;
  height: 260px;
  background: #0a0a0a;
  border: 1px solid rgba(255,90,0,0.3);
  box-shadow: 0 0 10px rgba(255,90,0,0.1);
  transition: all 0.6s ease;
}

/ ACTIVE (CLICK) /
.door.active {
  background: radial-gradient(#ff5a00, #ff2e00);
  box-shadow: 0 0 80px rgba(255,80,0,1);
}

/ SUCCESS */
.door.success {
  background: radial-gradient(#ffffff, #f5e6c8);
  box-shadow: 0 0 120px rgba(255,255,255,1);
}
</style>
</head>

<body>

<div id="stars" class="starfield"></div>

<div class="container">

<h1><span class="red">YOU</span> VS <span class="red">YOU</span></h1>

<p>
Most people fail.<br>
Not because they lack effort.<br>
Because they lack structure.
</p>

<input placeholder="Email">
<input placeholder="Phone">

<button onclick="handleSubmit()">JOIN WAITLIST</button>

<div id="door" class="door"></div>

<h2 id="successText" style="display:none;">YOU’RE IN</h2>

</div>

<script>
function handleSubmit() {
  const door = document.getElementById("door")
  const stars = document.getElementById("stars")
  const success = document.getElementById("successText")

  // START ANIMATION
  door.classList.add("active")
  stars.classList.add("fast")

  setTimeout(() => {
    door.classList.remove("active")
    door.classList.add("success")
    success.style.display = "block"
  }, 1500)
}
</script>

</body>
</html>
