<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAARK — YOU VS YOU</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .heading-font { font-family: 'Playfair Display', serif; }
    .bg-doorway {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://picsum.photos/id/1015/1920/1080');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-6">

  <div class="max-w-4xl w-full bg-doorway rounded-3xl p-12 shadow-2xl border border-gray-800">
    <div class="mb-12 flex justify-between items-center">
      <span class="text-red-600 font-bold text-2xl tracking-tighter">DAARK®</span>
      <span class="text-xs uppercase text-gray-400">No noise. No shortcuts.</span>
    </div>

    <h1 class="text-7xl md:text-8xl heading-font font-bold mb-6">
      YOU <span class="bg-white text-black px-4 py-1 rounded">VS</span> YOU
    </h1>

    <div class="text-lg text-gray-200 mb-10 max-w-sm">
      <p>Most people fail.</p>
      <p>Not because they lack effort.</p>
      <p>Because they lack structure.</p>
    </div>

    <form class="flex flex-col md:flex-row gap-4 mb-10">
      <input type="email" placeholder="Email address" class="bg-transparent border border-gray-600 rounded-lg px-4 py-3 outline-none focus:border-red-600">
      <input type="tel" placeholder="Phone number" class="bg-transparent border border-gray-600 rounded-lg px-4 py-3 outline-none focus:border-red-600">
      <button class="bg-white text-black font-semibold px-8 py-3 rounded-lg hover:bg-gray-200 transition">JOIN WAITLIST</button>
    </form>

    <div class="flex gap-8 text-center">
      <div><div class="text-4xl font-bold">06</div><div class="text-xs text-gray-500">DAYS</div></div>
      <div><div class="text-4xl font-bold">14</div><div class="text-xs text-gray-500">HOURS</div></div>
      <div><div class="text-4xl font-bold">37</div><div class="text-xs text-gray-500">MINUTES</div></div>
      <div><div class="text-4xl font-bold">52</div><div class="text-xs text-gray-500">SECONDS</div></div>
    </div>
  </div>

</body>
</html>
