<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAARK</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.screen{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
text-align:center;
z-index:2;
padding:40px 20px;
opacity:0;
pointer-events:none;
transition:opacity 0.8s ease;
}

.screen.active{
opacity:1;
pointer-events:auto;
}

/* TOP /
.logo{
font-size:60px;
font-weight:bold;
}

.red{color:#ff0000;}
.white{color:#ffffff;}

.subtitle{
letter-spacing:6px;
margin-top:10px;
}

/ CENTER /
.middle{
margin-top:auto;
margin-bottom:auto;
}

.journey{
font-size:22px;
margin:20px 0;
}

.support{
color:#aaa;
margin-bottom:30px;
}

/ BUTTON /
button{
padding:16px 40px;
background:#ff0000;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
border-radius:6px;
box-shadow:0 0 20px rgba(255,0,0,0.4);
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 0 30px rgba(255,0,0,0.7);
}

/ DOOR */
.door{
width:180px;
height:300px;
border:10px solid #111;
border-radius:6px;
position:relative;
margin-bottom:20px;
}

.door-frame{
position:absolute;
inset:0;
border:12px solid black;
z-index:2;
}

.door-light{
position:absolute;
inset:10%;
background:radial-gradient(circle,
rgba(255,0,0,1) 0%,
rgba(255,0,0,0.8) 40%,
rgba(120,0,0,0.6) 70%,
transparent 100%);
box-shadow:
0 0 120px red,
0 0 200px rgba(255,0,0,0.6);
}
</style>
</head>

<body>

<canvas id="starfield"></canvas>

<!-- LANDING -->
<div id="landing" class="screen active">

<div>
<h1 class="logo">
D<span class="white">A</span><span class="red">A</span>RK
</h1>
<p class="subtitle"><span class="red">YOU</span> VS <span class="red">YOU</span></p>
</div>

<div class="middle">
<p class="journey">The journey begins within.</p>

<p class="support">
Most people fail.<br>
Because they lack structure.
</p>

<button id="join">JOIN WAITLIST</button>
</div>

<div class="door">
<div class="door-frame"></div>
<div class="door-light"></div>
</div>

</div>

<!-- SUCCESS -->
<div id="success" class="screen">

<div>
<h1>YOU’RE THE LIGHT</h1>
</div>

<div class="middle">
<p class="journey">
You've taken the first step.<br>
Now become undeniable.
</p>

<button id="back">BACK</button>
</div>

<div class="door">
<div class="door-frame"></div>
<div class="door-light"></div>
</div>

</div>

<script>
const canvas=document.getElementById("starfield");
const ctx=canvas.getContext("2d");

let stars=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

class Star{
constructor(){this.reset();}
reset(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.z=Math.random()*canvas.width;
}
update(){
this.z-=2;
if(this.z<=1)this.reset();
}
draw(){
let k=128/this.z;
let x=(this.x-canvas.width/2)*k+canvas.width/2;
let y=(this.y-canvas.height/2)*k+canvas.height/2;
ctx.fillStyle="white";
ctx.fillRect(x,y,2,2);
}
}

function init(){
resize();
for(let i=0;i<400;i++)stars.push(new Star());
animate();
}

function animate(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
stars.forEach(s=>{s.update();s.draw();});
requestAnimationFrame(animate);
}

document.getElementById("join").onclick=()=>{
document.getElementById("landing").classList.remove("active");
document.getElementById("success").classList.add("active");
};

document.getElementById("back").onclick=()=>{
document.getElementById("success").classList.remove("active");
document.getElementById("landing").classList.add("active");
};

window.onresize=resize;

init();
</script>

</body>
</html>
