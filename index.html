<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAARK</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.screen{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2;
opacity:0;
pointer-events:none;
transition:opacity 0.8s ease;
}

.screen.active{
opacity:1;
pointer-events:auto;
}

.logo{
font-size:60px;
font-weight:bold;
}

.red{color:#ff0000;}

button{
padding:15px 30px;
background:red;
border:none;
color:white;
margin-top:20px;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="starfield"></canvas>

<!-- Landing -->
<div id="landing" class="screen active">
<h1 class="logo">
D<span>A</span><span class="red">A</span>RK
</h1>

<p><span class="red">YOU</span> VS <span class="red">YOU</span></p>

<button id="join">JOIN WAITLIST</button>
</div>

<!-- Success -->
<div id="success" class="screen">
<h1>YOU’RE THE LIGHT</h1>
<button id="back">BACK</button>
</div>

<script>
// Canvas
const canvas=document.getElementById("starfield");
const ctx=canvas.getContext("2d");

let stars=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

class Star{
constructor(){this.reset();}
reset(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.z=Math.random()*canvas.width;
}
update(){
this.z-=2;
if(this.z<=0)this.reset();
}
draw(){
let k=128/this.z;
let x=(this.x-canvas.width/2)*k+canvas.width/2;
let y=(this.y-canvas.height/2)*k+canvas.height/2;
ctx.fillRect(x,y,2,2);
}
}

function init(){
resize();
for(let i=0;i<300;i++)stars.push(new Star());
animate();
}

function animate(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
stars.forEach(s=>{s.update();s.draw();});
requestAnimationFrame(animate);
}

// UI
document.getElementById("join").onclick=()=>{
document.getElementById("landing").classList.remove("active");
document.getElementById("success").classList.add("active");
};

document.getElementById("back").onclick=()=>{
document.getElementById("success").classList.remove("active");
document.getElementById("landing").classList.add("active");
};

window.onresize=resize;

init();
</script>

</body>
</html>
