<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAARK</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Inter, sans-serif;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.screen{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
opacity:0;
pointer-events:none;
transition:opacity 1s ease;
}

.screen.active{
opacity:1;
pointer-events:auto;
}

.logo{
font-size:70px;
font-weight:700;
letter-spacing:-2px;
}

.red{
color:#ff0000;
text-shadow:0 0 10px rgba(255,0,0,0.6);
}

.subtitle{
margin-top:10px;
letter-spacing:6px;
}

.journey{
margin:20px 0;
font-size:22px;
}

.support{
color:#aaa;
margin-bottom:30px;
}

button{
padding:16px 40px;
background:#ff0000;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
border-radius:6px;
box-shadow:0 0 20px rgba(255,0,0,0.4);
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 0 30px rgba(255,0,0,0.7);
}
<button id="join">JOIN WAITLIST</button>

<div class="door">
  <div class="door-light"></div>
</div>
.door{
width:160px;
height:260px;
margin-top:40px;
border:8px solid #111;
position:relative;
}

.door-light{
position:absolute;
inset:10%;
background:radial-gradient(circle,#ff0000,transparent);
box-shadow:0 0 80px red;
}
</style>
</head>

<body>

<canvas id="starfield"></canvas>

<div id="landing" class="screen active">
  <h1 class="logo">
    D<span>A</span><span class="red">A</span>RK
  </h1>

  <p class="subtitle">
    <span class="red">YOU</span> VS <span class="red">YOU</span>
  </p>

  <p class="journey">The journey begins within.</p>

  <p class="support">
    Most people fail.<br>
    Because they lack structure.
  </p>

  <button id="join">JOIN WAITLIST</button>
</div>

<!-- Success -->
<div id="success" class="screen">
  <h1>YOU’RE THE LIGHT</h1>

  <p class="journey">
    You've taken the first step.<br>
    Now become undeniable.
  </p>

  <button id="back">BACK</button>
</div>
<script>
// Canvas
const canvas=document.getElementById("starfield");
const ctx=canvas.getContext("2d");

let stars=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

class Star{
constructor(){this.reset();}
reset(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.z=Math.random()*canvas.width;
}
update(){
this.z-=2;
if(this.z<=0)this.reset();
}
draw(){
let k=128/this.z;
let x=(this.x-canvas.width/2)*k+canvas.width/2;
let y=(this.y-canvas.height/2)*k+canvas.height/2;
ctx.fillRect(x,y,2,2);
}
}

function init(){
resize();
for(let i=0;i<300;i++)stars.push(new Star());
animate();
}

function animate(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
stars.forEach(s=>{s.update();s.draw();});
requestAnimationFrame(animate);
}

// UI
document.getElementById("join").onclick=()=>{
document.getElementById("landing").classList.remove("active");
document.getElementById("success").classList.add("active");
};

document.getElementById("back").onclick=()=>{
document.getElementById("success").classList.remove("active");
document.getElementById("landing").classList.add("active");
};

window.onresize=resize;

init();
</script>

</body>
</html>
