<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAARK • You vs You</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Inter',sans-serif;
    background:#000;
    color:#fff;
    overflow:hidden;
}

/* Canvas /
canvas {
    position:fixed;
    top:0; left:0;
    z-index:1;
}

/ Screen /
.screen {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 1s ease;
    z-index:2;
}

.screen.active {
    opacity:1;
    pointer-events:auto;
}

/ Layout /
.container {
    max-width:600px;
    width:100%;
    padding:2rem;
    text-align:center;
}

/ Logo /
.logo {
    font-family:'Playfair Display',serif;
    font-size:clamp(3rem,8vw,6rem);
    letter-spacing:-0.02em;
}

.red { color:#ff0000; }
.white { color:#fff; }

.logo span.red {
    text-shadow:0 0 12px rgba(255,0,0,0.6);
}

.subtitle {
    letter-spacing:0.4em;
    margin-top:10px;
}

/ Text /
.journey { margin:20px 0; font-size:1.5rem; }

.supporting {
    color:#aaa;
    margin-bottom:25px;
}

/ Form /
input {
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ff000055;
    background:#111;
    color:#fff;
}

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#ff0000;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

/ Door */
.door {
    width:200px;
    height:300px;
    margin:30px auto;
    border:10px solid #111;
    position:relative;
}

.door-light {
    position:absolute;
    inset:10%;
    background:radial-gradient(circle,#ff4444,transparent);
    box-shadow:0 0 120px red;
}

.white-door .door-light {
    background:radial-gradient(circle,#fff,transparent);
    box-shadow:0 0 150px #fff;
}
</style>
</head>

<body>

<canvas id="starfield"></canvas>

<!-- LANDING -->
<div id="landing" class="screen active">
<div class="container">

<h1 class="logo">
D<span class="white">A</span><span class="red">A</span>RK
</h1>

<p class="subtitle"><span class="red">YOU</span> VS <span class="red">YOU</span></p>

<p class="journey">The journey begins within.</p>

<p class="supporting">
Most people fail.<br>
Because they lack structure.
</p>

<form id="form">
<input type="email" id="email" placeholder="Email" required>
<input type="tel" placeholder="Phone">
<button>JOIN WAITLIST</button>
</form>

<div id="door" class="door">
<div class="door-light"></div>
</div>

</div>
</div>

<!-- SUCCESS -->
<div id="success" class="screen">
<div class="container">

<h1 class="logo">YOU’RE THE LIGHT</h1>
<p class="subtitle"><span class="red">YOU</span> VS <span class="red">YOU</span></p>

<p class="journey">
You've taken the first step.<br>
Now become undeniable.
</p>

<button id="back">BACK TO HOME</button>

<div id="door2" class="door white-door">
<div class="door-light"></div>
</div>

</div>
</div>

<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars=[];

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}

class Star{
constructor(){this.reset();}
reset(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.z=Math.random()*1000;
}
update(){
this.z-=5;
if(this.z<=0)this.reset();
}
draw(){
let k=128/this.z;
let x=(this.x-canvas.width/2)*k+canvas.width/2;
let y=(this.y-canvas.height/2)*k+canvas.height/2;
ctx.fillRect(x,y,2,2);
}
}

function init(){
resize();
for(let i=0;i<500;i++)stars.push(new Star());
animate();
}

function animate(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
stars.forEach(s=>{s.update();s.draw();});
requestAnimationFrame(animate);
}

document.getElementById('form').onsubmit=e=>{
e.preventDefault();
document.getElementById('landing').classList.remove('active');
document.getElementById('success').classList.add('active');
}

document.getElementById('back').onclick=()=>{
document.getElementById('success').classList.remove('active');
document.getElementById('landing').classList.add('active');
}

window.onresize=resize;

init();
</script>

</body>
</html>
