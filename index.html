<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAARK</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* CENTER UI */
.ui {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

input {
  display: block;
  width: 260px;
  margin: 10px auto;
  padding: 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
}

button {
  padding: 12px 20px;
  background: #ff3b1f;
  border: none;
  color: white;
  cursor: pointer;
}

/* DOOR */
.door {
  width: 90px;
  height: 170px;
  margin: 30px auto;
  background: linear-gradient(#ff4a2a,#ff2a1a);
  box-shadow:
    0 0 30px rgba(255,60,30,0.5),
    0 0 100px rgba(255,60,30,0.3);
  transition: all 1.2s ease;
}

.door.success {
  background: linear-gradient(#fff7e2,#fff3d6);
  box-shadow:
    0 0 60px rgba(255,243,214,0.8),
    0 0 160px rgba(255,243,214,0.6);
}

/* VIGNETTE */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7));
  pointer-events: none;
}

/* GRAIN */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.05;
  pointer-events: none;
}
</style>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<body>

<canvas id="bg"></canvas>

<div class="ui">
  <h1>DAARK</h1>

  <input id="email" placeholder="Enter your email">
  <input id="phone" placeholder="Enter your phone number">

  <button id="btn">JOIN WAITLIST</button>

  <div class="door" id="door"></div>
</div>

</body>
</html>
