<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAARK</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* UI */
.ui {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  color: white;
  z-index: 10;
}

h1 {
  letter-spacing: 6px;
  font-weight: 300;
}

/* INPUTS */
input {
  width: 260px;
  margin: 10px auto;
  padding: 12px;
  display: block;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
}

input:focus {
  outline: none;
  border-color: #ff3b1f;
  box-shadow: 0 0 12px rgba(255,60,30,0.3);
}

/* BUTTON */
button {
  padding: 12px 20px;
  background: #ff3b1f;
  border: none;
  color: white;
  cursor: pointer;
}

/* DOOR */
.door {
  width: 90px;
  height: 170px;
  margin: 30px auto;
  position: relative;
  background: linear-gradient(#ff4a2a,#ff2a1a);
  box-shadow:
    0 0 30px rgba(255,60,30,0.5),
    0 0 100px rgba(255,60,30,0.3);
  transition: all 1.2s ease;
}

.door.success {
  background: linear-gradient(#fff7e2,#fff3d6);
  box-shadow:
    0 0 50px rgba(255,243,214,0.8),
    0 0 160px rgba(255,243,214,0.6);
}

/* GROUND LIGHT */
.ground {
  position: absolute;
  bottom: -30px;
  width: 200px;
  height: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,200,120,0.4), transparent 70%);
  filter: blur(10px);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="ui">
  <h1>DAARK</h1>

  <input id="email" placeholder="Enter your email">
  <input id="phone" placeholder="Enter your phone number">

  <button id="btn">JOIN WAITLIST</button>

  <div class="door" id="door">
    <div class="ground"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
// =====================
// THREE.JS BACKGROUND
// =====================
const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000)
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById("bg"), alpha:true})

renderer.setSize(innerWidth, innerHeight)
camera.position.z = 5

scene.fog = new THREE.Fog(0x000000, 10, 60)

// STARS
const count = 900
const positions = new Float32Array(count * 3)

for (let i=0;i<count;i++) {
  let x = (Math.random()-0.5)*100
  let y = (Math.random()-0.5)*100

  // center clean
  if (Math.sqrt(x*x+y*y)<8) continue

  positions[i*3] = x
  positions[i*3+1] = y
  positions[i*3+2] = -Math.random()*100
}

const geo = new THREE.BufferGeometry()
geo.setAttribute('position', new THREE.BufferAttribute(positions,3))

const mat = new THREE.PointsMaterial({
  color: 0x9fb3ff,
  size: 0.06,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite:false
})

const stars = new THREE.Points(geo, mat)
scene.add(stars)

let speed = 0.03
let t = 0

function animate() {
  requestAnimationFrame(animate)

  t += 0.001
  camera.position.x = Math.sin(t)*0.3
  camera.position.y = Math.cos(t)*0.2

  const pos = geo.attributes.position.array

  for (let i=0;i<pos.length;i+=3) {
    pos[i+2]+=speed
    if(pos[i+2]>2) pos[i+2]=-100
  }

  geo.attributes.position.needsUpdate = true
  renderer.render(scene,camera)
}
animate()

// =====================
// INTERACTION SYSTEM
// =====================
const btn = document.getElementById("btn")
const door = document.getElementById("door")

btn.addEventListener("click", async () => {

  const email = document.getElementById("email").value
  const phone = document.getElementById("phone").value

  if(!email || !phone){
    alert("Fill all fields")
    return
  }

  // animation sequence
  gsap.to({v:speed},{
    v:0.7,
    duration:1,
    ease:"power2.out",
    onUpdate:function(){
      speed = this.targets()[0].v
    }
  })

  setTimeout(()=>{
    door.classList.add("success")
  },500)

  // backend
  try {
    await fetch("YOUR_N8N_WEBHOOK_URL",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email,phone})
    })
  } catch(e){
    console.error(e)
  }
})
</script>

</body>
</html>
